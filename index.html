<!DOCTYPE html>
<html lang="en" style="background:#000 !important;">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Nutrition</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#000;--surface:#1c1c1e;--text:#f5f5f7;--text2:#98989f;--text3:#48484a;
  --green:#30d158;--red:#ff453a;--blue:#0a84ff;--orange:#ff9f0a;--purple:#bf5af2;
  --bar-bg:#38383a;--divider:#2c2c2e;--overlay:rgba(0,0,0,.35);--sheet:#1c1c1e;
  --card-hover:#2c2c2e;
}
.light{
  --bg:#ffffff;--surface:#f5f5f7;--text:#1d1d1f;--text2:#86868b;--text3:#c7c7cc;
  --green:#34c759;--red:#ff3b30;--blue:#007aff;--orange:#ff9500;--purple:#af52de;
  --bar-bg:#e8e8ed;--divider:#e5e5ea;--overlay:rgba(0,0,0,.3);--sheet:#fff;
  --card-hover:#ebebed;
}
html,body{background:var(--bg)!important;color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','SF Pro Display',system-ui,sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh;overflow-x:hidden}
.app{max-width:430px;margin:0 auto;padding:16px 16px 80px;opacity:0;animation:fadeUp .5s ease forwards}
.app.no-anim,.app.no-anim *{animation:none!important}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
@keyframes countUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes dotPop{0%{transform:scale(0)}60%{transform:scale(1.3)}100%{transform:scale(1)}}
@keyframes barGrow{from{width:0}to{width:var(--tw)}}

.nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.nav h1{font-size:32px;font-weight:800;letter-spacing:-.8px;background:linear-gradient(135deg,var(--text),var(--text2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nr{display:flex;gap:8px;align-items:center}
.ib{width:34px;height:34px;border-radius:50%;border:none;cursor:pointer;background:var(--surface);display:flex;align-items:center;justify-content:center;color:var(--text);transition:all .2s}
.ib:active{transform:scale(.9);opacity:.6}
.ib svg{width:15px;height:15px;display:block}
.pill{display:flex;align-items:center;gap:5px;background:var(--surface);border:none;color:var(--text);font:600 13px/1 -apple-system,sans-serif;padding:8px 14px;border-radius:20px;cursor:pointer;transition:all .2s}
.pill:active{transform:scale(.95);opacity:.6}
.pill svg{width:8px;height:5px;flex-shrink:0;transition:transform .3s cubic-bezier(.4,0,.2,1)}
.pill.open svg{transform:rotate(180deg)}

.cal-grid{margin-bottom:20px;animation:fadeUp .5s .1s ease both}
.cal-head{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:4px}
.cal-head span{text-align:center;font-size:11px;font-weight:600;color:var(--text3);padding:4px 0;text-transform:uppercase;letter-spacing:.5px}
.cal-days{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cd{aspect-ratio:1;border-radius:50%;border:none;cursor:pointer;background:transparent;font-family:inherit;font-size:15px;font-weight:500;color:var(--text3);display:flex;align-items:center;justify-content:center;position:relative;transition:all .2s}
.cd:active:not(.empty){transform:scale(.85)}
.cd.data{color:var(--text)}
.cd.sel{background:var(--text);color:var(--bg);font-weight:700;animation:pulse .3s ease}
.cd.today:not(.sel){color:var(--blue);font-weight:700}
.cd.data:not(.sel)::after{content:'';position:absolute;bottom:3px;width:4px;height:4px;border-radius:50%;background:var(--green);animation:dotPop .3s ease both}
.cd.empty{cursor:default}

.stats-section{display:flex;align-items:center;gap:20px;margin-bottom:24px;animation:fadeUp .5s .15s ease both}
.ring-wrap{position:relative;width:100px;height:100px;flex-shrink:0}
.ring-wrap svg{transform:rotate(-90deg)}
.ring-bg{fill:none;stroke:var(--bar-bg);stroke-width:7}
.ring-fill{fill:none;stroke-width:7;stroke-linecap:round;transition:stroke-dashoffset 1s cubic-bezier(.4,0,.2,1),stroke .3s}
.ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-cal{font-size:22px;font-weight:800;letter-spacing:-1px;animation:countUp .5s .3s ease both}
.ring-label{font-size:10px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px}
.stats-right{flex:1}
.stats-goal{font-size:13px;color:var(--text2);margin-bottom:8px}
.stats-goal span{font-weight:700;color:var(--text)}
.stats-status{font-size:15px;font-weight:700}
.stats-status.g{color:var(--green)}.stats-status.r{color:var(--red)}.stats-status.z{color:var(--text3)}

.macros{display:flex;gap:8px;margin-bottom:28px;animation:fadeUp .5s .2s ease both}
.macro-card{flex:1;background:var(--surface);border-radius:14px;padding:12px;text-align:center;transition:transform .2s}
.macro-card:active{transform:scale(.96)}
.macro-val{font-size:18px;font-weight:800;letter-spacing:-.5px}
.macro-label{font-size:10px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.3px;margin-top:1px}
.macro-bar{width:100%;height:3px;background:var(--bar-bg);border-radius:2px;margin-top:6px;overflow:hidden}
.macro-fill{height:100%;border-radius:2px;animation:barGrow .8s .4s cubic-bezier(.4,0,.2,1) both}
.macro-fill.p{background:var(--blue)}.macro-fill.c{background:var(--orange)}.macro-fill.f{background:var(--purple)}

.meals-wrap{animation:fadeUp .5s .25s ease both}
.meals-h{font-size:22px;font-weight:800;letter-spacing:-.4px;margin-bottom:14px}
.meal-section{margin-bottom:10px;border-radius:16px;background:var(--surface);overflow:hidden;transition:all .3s cubic-bezier(.4,0,.2,1)}
.meal-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;cursor:pointer;transition:background .15s;-webkit-user-select:none;user-select:none}
.meal-header:active{background:var(--card-hover)}
.mh-left{display:flex;align-items:center;gap:10px}
.mh-icon{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center}
.mh-icon svg{width:16px;height:16px}
.mh-icon.breakfast{background:rgba(48,209,88,.15);color:var(--green)}
.mh-icon.lunch{background:rgba(255,159,10,.15);color:var(--orange)}
.mh-icon.dinner{background:rgba(10,132,255,.15);color:var(--blue)}
.mh-icon.snacks{background:rgba(191,82,222,.15);color:var(--purple)}
.mh-info{display:flex;flex-direction:column}
.mh-name{font-size:15px;font-weight:700;text-transform:capitalize}
.mh-count{font-size:11px;color:var(--text2);font-weight:500}
.mh-right{display:flex;align-items:center;gap:10px}
.mh-cal{font-size:15px;font-weight:700;font-variant-numeric:tabular-nums}
.mh-arrow{width:12px;height:12px;color:var(--text3);transition:transform .3s cubic-bezier(.4,0,.2,1)}
.meal-section.open .mh-arrow{transform:rotate(90deg)}

.meal-items{max-height:0;overflow:hidden;transition:max-height .4s cubic-bezier(.4,0,.2,1)}
.meal-section.open .meal-items{max-height:1000px}
.meal-summary{display:flex;gap:12px;padding:0 16px 10px;border-bottom:1px solid var(--divider)}
.ms-tag{font-size:11px;font-weight:600;color:var(--text2)}
.ms-tag span{font-weight:700;color:var(--text)}
.mi{display:flex;align-items:center;padding:12px 16px;cursor:pointer;transition:background .15s}
.mi:active{background:var(--card-hover)}
.mi:not(:last-child){border-bottom:1px solid var(--divider)}
.mi-img{width:42px;height:42px;border-radius:10px;overflow:hidden;flex-shrink:0;margin-right:12px;background:var(--bar-bg);display:flex;align-items:center;justify-content:center;font-size:22px}
.mi-info{flex:1;min-width:0}
.mi-name{font-size:15px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mi-tags{display:flex;gap:6px;margin-top:2px}
.mi-tag{font-size:11px;color:var(--text2);font-weight:500}
.mi-cal{font-size:15px;font-weight:700;color:var(--text2);font-variant-numeric:tabular-nums;flex-shrink:0;margin-left:8px}

.modal-ov{position:fixed;inset:0;z-index:50;background:var(--overlay);opacity:0;pointer-events:none;transition:opacity .25s;-webkit-backdrop-filter:blur(3px);backdrop-filter:blur(3px)}
.modal-ov.on{opacity:1;pointer-events:all}
.modal{position:fixed;bottom:0;left:0;right:0;z-index:51;background:var(--sheet);border-radius:20px 20px 0 0;max-height:70vh;transform:translateY(100%);transition:transform .4s cubic-bezier(.32,.72,0,1);display:flex;flex-direction:column;overflow:hidden}
.modal.on{transform:translateY(0)}
.modal-bar{display:flex;justify-content:center;padding:10px 0 6px}
.modal-bar span{width:36px;height:5px;border-radius:3px;background:var(--text3)}
.modal-emoji{width:100%;height:140px;display:flex;align-items:center;justify-content:center;font-size:64px;background:var(--surface)}
.modal-body{padding:20px}
.modal-name{font-size:22px;font-weight:800;letter-spacing:-.4px;margin-bottom:4px}
.modal-meal{font-size:13px;color:var(--text2);font-weight:600;text-transform:capitalize;margin-bottom:16px}
.modal-macros{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.mm-card{background:var(--surface);border-radius:12px;padding:12px 8px;text-align:center}
.mm-val{font-size:20px;font-weight:800;letter-spacing:-.5px}
.mm-label{font-size:10px;font-weight:600;color:var(--text2);text-transform:uppercase;margin-top:2px}

.nm{text-align:center;padding:40px 20px;animation:fadeIn .5s ease both}
.nm-text{font-size:14px;color:var(--text3);font-weight:500}

.ov{position:fixed;inset:0;z-index:30;opacity:0;pointer-events:none;transition:opacity .25s;background:var(--overlay);-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px)}
.ov.on{opacity:1;pointer-events:all}
.sh{position:fixed;bottom:0;left:0;right:0;z-index:31;background:var(--sheet);border-radius:14px 14px 0 0;max-height:50vh;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .4s cubic-bezier(.32,.72,0,1)}
.sh.on{transform:translateY(0)}
.sh-bar{display:flex;justify-content:center;padding:8px 0 4px}
.sh-bar span{width:36px;height:5px;border-radius:3px;background:var(--text3)}
.sh-t{font-size:13px;font-weight:600;text-align:center;color:var(--text2);padding:2px 0 10px;text-transform:uppercase;letter-spacing:.5px}
.sh-l{overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 16px 40px;flex:1}
.sh-i{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-radius:12px;cursor:pointer;transition:background .1s;margin-bottom:1px}
.sh-i:active{background:var(--surface)}
.sh-i.on{background:rgba(10,132,255,.1)}
.sh-il{font-size:17px;font-weight:400;color:var(--text)}
.sh-i.on .sh-il{color:var(--blue);font-weight:500}
.sh-ck{font-weight:600;color:var(--blue);opacity:0;font-size:15px}
.sh-i.on .sh-ck{opacity:1}
</style>
</head>
<body style="background:#000 !important;">
<div class="app" id="app"></div>
<div class="ov" id="ov"></div>
<div class="sh" id="sh"><div class="sh-bar"><span></span></div><div class="sh-t">Month</div><div class="sh-l" id="sl"></div></div>
<div class="modal-ov" id="mov"></div>
<div class="modal" id="modal"><div class="modal-bar"><span></span></div><div id="mc"></div></div>
<script>
const G=2100,PG=190,CG=210,FG=70;
let data={};

// Load data from external JSON
async function loadData(){
  try{
    const r=await fetch('data.json?t='+Date.now());
    if(r.ok)data=await r.json();
  }catch(e){console.log('No data.json found, using empty')}
  render();
  // After first paint, disable entrance animations so re-renders don't replay them
  setTimeout(()=>{const a=$('app');if(a)a.classList.add('no-anim')},900);
}

// Food emoji mapping
const FOOD_E={
  egg:'🥚',eggs:'🥚',chicken:'🍗',rice:'🍚',salad:'🥗',fish:'🐟',salmon:'🐟',steak:'🥩',beef:'🥩',
  pasta:'🍝',bread:'🍞',sandwich:'🥪',burger:'🍔',pizza:'🍕',taco:'🌮',sushi:'🍣',shrimp:'🍤',
  milk:'🥛',yogurt:'🥛',cheese:'🧀',avocado:'🥑',banana:'🍌',apple:'🍎',orange:'🍊',berry:'🫐',
  smoothie:'🥤',coffee:'☕',tea:'🍵',water:'💧',juice:'🧃',protein:'💪',shake:'🥤',bar:'🍫',
  oat:'🌾',oatmeal:'🌾',cereal:'🥣',pancake:'🥞',waffle:'🥞',bacon:'🥓',toast:'🍞',
  cookie:'🍪',cake:'🍰',chocolate:'🍫',candy:'🍬',donut:'🍩',kitkat:'🍫',matcha:'🍵',
  fries:'🍟',chips:'🍟',nuts:'🥜',almond:'🥜',peanut:'🥜',soup:'🍜',ramen:'🍜',noodle:'🍜',
  potato:'🥔',corn:'🌽',broccoli:'🥦',carrot:'🥕',tomato:'🍅',
  pork:'🥩',lamb:'🥩',turkey:'🦃',wing:'🍗',rib:'🍖',calamari:'🦑',squid:'🦑',
  ice:'🍦',cream:'🍦',yoghurt:'🥛',granola:'🥣',wrap:'🌯',burrito:'🌯',
  default:'🍽️'
};
function foodE(name){const n=name.toLowerCase();for(const[k,v]of Object.entries(FOOD_E)){if(k!=='default'&&n.includes(k))return v}return FOOD_E.default}

const MEAL_ICONS={
  breakfast:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 2v4M4.93 4.93l2.83 2.83M2 12h4M4.93 19.07l2.83-2.83M12 18v4M17.24 17.24l2.83 2.83M18 12h4M17.24 6.76l2.83-2.83"/><circle cx="12" cy="12" r="4"/></svg>`,
  lunch:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/></svg>`,
  dinner:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`,
  snacks:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg>`
};

let sel=new Date().toISOString().slice(0,10),vM=new Date().getMonth(),vY=new Date().getFullYear(),shO=false,openSections={};
const $=id=>document.getElementById(id);

function tot(d){const day=data[d];if(!day)return{cal:0,p:0,c:0,f:0,meals:null};let t={cal:0,p:0,c:0,f:0};for(const k of Object.keys(day))for(const m of day[k]){t.cal+=m.cal;t.p+=m.p;t.c+=m.c;t.f+=m.f}return{...t,meals:day}}
function mealTot(items){let t={cal:0,p:0,c:0,f:0};for(const m of items){t.cal+=m.cal;t.p+=m.p;t.c+=m.c;t.f+=m.f}return t}
const dim=(y,m)=>new Date(y,m+1,0).getDate();
const pad=n=>String(n).padStart(2,'0');
const ds=(y,m,d)=>`${y}-${pad(m+1)}-${pad(d)}`;
const ml=(y,m)=>new Date(y,m).toLocaleDateString('en-US',{month:'long',year:'numeric'});
const sm=(y,m)=>new Date(y,m).toLocaleDateString('en-US',{month:'short'});
const firstDow=(y,m)=>new Date(y,m,1).getDay();

function months(){const ms=[],now=new Date();for(let i=12;i>=0;i--){const d=new Date(now.getFullYear(),now.getMonth()-i,1);ms.push({y:d.getFullYear(),m:d.getMonth()})}Object.keys(data).forEach(s=>{const[y,m]=s.split('-').map(Number);if(!ms.find(x=>x.y===y&&x.m===m-1))ms.unshift({y,m:m-1})});ms.sort((a,b)=>a.y===b.y?a.m-b.m:a.y-b.y);return ms}
function sheet(o){shO=typeof o==='boolean'?o:!shO;$('ov').classList.toggle('on',shO);$('sh').classList.toggle('on',shO);const b=document.querySelector('.pill');if(b)b.classList.toggle('open',shO);if(shO)renderSheet()}
function renderSheet(){const ms=months();$('sl').innerHTML=ms.map(o=>`<div class="sh-i${o.y===vY&&o.m===vM?' on':''}" data-y="${o.y}" data-m="${o.m}"><span class="sh-il">${ml(o.y,o.m)}</span><span class="sh-ck">&#10003;</span></div>`).join('');$('sl').querySelectorAll('.sh-i').forEach(el=>el.addEventListener('click',()=>{vY=+el.dataset.y;vM=+el.dataset.m;sel=ds(vY,vM,1);sheet(false);render()}));setTimeout(()=>{const a=$('sl').querySelector('.on');if(a)a.scrollIntoView({block:'center'})},40)}

function showModal(item,type){
  const e=foodE(item.name);
  $('mc').innerHTML=`
    <div class="modal-emoji">${e}</div>
    <div class="modal-body">
      <div class="modal-name">${item.name}</div>
      <div class="modal-meal">${type}</div>
      <div class="modal-macros">
        <div class="mm-card"><div class="mm-val">${item.cal}</div><div class="mm-label">kcal</div></div>
        <div class="mm-card"><div class="mm-val" style="color:var(--blue)">${item.p}g</div><div class="mm-label">protein</div></div>
        <div class="mm-card"><div class="mm-val" style="color:var(--orange)">${item.c}g</div><div class="mm-label">carbs</div></div>
        <div class="mm-card"><div class="mm-val" style="color:var(--purple)">${item.f}g</div><div class="mm-label">fat</div></div>
      </div>
    </div>`;
  $('mov').classList.add('on');$('modal').classList.add('on');
}
function hideModal(){$('mov').classList.remove('on');$('modal').classList.remove('on')}

function toggleTheme(){
  const goLight=!document.body.classList.contains('light');
  document.body.classList.toggle('light');
  const bg=goLight?'#ffffff':'#000000';
  document.documentElement.style.setProperty('background',bg,'important');
  document.body.style.setProperty('background',bg,'important');
  render();
}

const sunI=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>`;
const moonI=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`;
const chevI=`<svg viewBox="0 0 10 6" fill="none"><path d="M1 1l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
const arrowR=`<svg viewBox="0 0 8 14" fill="none"><path d="M1 1l6 6-6 6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`;

function render(){
  const today=new Date().toISOString().slice(0,10);
  const isLight=document.body.classList.contains('light');
  const t=tot(sel);
  const pct=Math.min(t.cal/G,1);
  const over=t.cal>G;
  const rem=G-t.cal;
  const days=dim(vY,vM);
  const fDow=firstDow(vY,vM);
  const R=43,C=2*Math.PI*R;
  const ringColor=t.cal===0?'var(--text3)':over?'var(--red)':'var(--green)';
  const ringOffset=C-(pct*C);

  const heads=['Su','Mo','Tu','We','Th','Fr','Sa'].map(d=>`<span>${d}</span>`).join('');
  let cells='';
  for(let i=0;i<fDow;i++)cells+=`<button class="cd empty"></button>`;
  for(let d=1;d<=days;d++){const s=ds(vY,vM,d);let c='cd';if(s===sel)c+=' sel';if(s===today)c+=' today';if(data[s])c+=' data';cells+=`<button class="${c}" data-d="${s}">${d}</button>`}

  const pp=Math.min(Math.round((t.p/PG)*100),100);
  const cp=Math.min(Math.round((t.c/CG)*100),100);
  const fp=Math.min(Math.round((t.f/FG)*100),100);

  let mealsHTML='';
  const mealOrder=['breakfast','lunch','dinner','snacks'];
  if(t.meals){
    for(const type of mealOrder){
      if(!t.meals[type]||!t.meals[type].length)continue;
      const items=t.meals[type];
      const mt=mealTot(items);
      const isOpen=openSections[type];
      mealsHTML+=`
        <div class="meal-section${isOpen?' open':''}" data-type="${type}">
          <div class="meal-header" data-type="${type}">
            <div class="mh-left">
              <div class="mh-icon ${type}">${MEAL_ICONS[type]}</div>
              <div class="mh-info">
                <div class="mh-name">${type}</div>
                <div class="mh-count">${items.length} item${items.length>1?'s':''}  ·  ${mt.cal} kcal</div>
              </div>
            </div>
            <div class="mh-right">
              <div class="mh-cal">${mt.cal}</div>
              <div class="mh-arrow">${arrowR}</div>
            </div>
          </div>
          <div class="meal-items">
            <div class="meal-summary">
              <div class="ms-tag"><span>${mt.p}g</span> protein</div>
              <div class="ms-tag"><span>${mt.c}g</span> carbs</div>
              <div class="ms-tag"><span>${mt.f}g</span> fat</div>
            </div>
            ${items.map((item,i)=>{
              const e=foodE(item.name);
              return `<div class="mi" data-type="${type}" data-idx="${i}">
                <div class="mi-img">${e}</div>
                <div class="mi-info">
                  <div class="mi-name">${item.name}</div>
                  <div class="mi-tags">
                    <span class="mi-tag">${item.p}p</span>
                    <span class="mi-tag">${item.c}c</span>
                    <span class="mi-tag">${item.f}f</span>
                  </div>
                </div>
                <div class="mi-cal">${item.cal}</div>
              </div>`}).join('')}
          </div>
        </div>`;
    }
  }
  if(!mealsHTML)mealsHTML=`<div class="nm"><div class="nm-text">No meals logged</div></div>`;

  const rc=t.cal===0?'z':over?'r':'g';
  const rl=t.cal===0?`${G.toLocaleString()} remaining`:over?`${Math.abs(rem).toLocaleString()} over`:`${Math.abs(rem).toLocaleString()} remaining`;

  $('app').innerHTML=`
    <div class="nav">
      <h1>Nutrition</h1>
      <div class="nr">
        <button class="ib" id="tb">${isLight?moonI:sunI}</button>
        <button class="pill${shO?' open':''}" id="mb">${sm(vY,vM)} ${vY} ${chevI}</button>
      </div>
    </div>
    <div class="cal-grid">
      <div class="cal-head">${heads}</div>
      <div class="cal-days">${cells}</div>
    </div>
    <div class="stats-section">
      <div class="ring-wrap">
        <svg width="100" height="100" viewBox="0 0 100 100">
          <circle class="ring-bg" cx="50" cy="50" r="${R}"/>
          <circle class="ring-fill" cx="50" cy="50" r="${R}" stroke="${ringColor}" stroke-dasharray="${C}" stroke-dashoffset="${ringOffset}"/>
        </svg>
        <div class="ring-center">
          <div class="ring-cal">${t.cal.toLocaleString()}</div>
          <div class="ring-label">kcal</div>
        </div>
      </div>
      <div class="stats-right">
        <div class="stats-goal">of <span>${G.toLocaleString()}</span> kcal goal</div>
        <div class="stats-status ${rc}">${rl}</div>
      </div>
    </div>
    <div class="macros">
      <div class="macro-card">
        <div class="macro-val" style="color:var(--blue)">${Math.round(t.p)}g</div>
        <div class="macro-label">protein</div>
        <div class="macro-bar"><div class="macro-fill p" style="--tw:${pp}%"></div></div>
      </div>
      <div class="macro-card">
        <div class="macro-val" style="color:var(--orange)">${Math.round(t.c)}g</div>
        <div class="macro-label">carbs</div>
        <div class="macro-bar"><div class="macro-fill c" style="--tw:${cp}%"></div></div>
      </div>
      <div class="macro-card">
        <div class="macro-val" style="color:var(--purple)">${Math.round(t.f)}g</div>
        <div class="macro-label">fat</div>
        <div class="macro-bar"><div class="macro-fill f" style="--tw:${fp}%"></div></div>
      </div>
    </div>
    <div class="meals-wrap">
      <div class="meals-h">Meals</div>
      ${mealsHTML}
    </div>`;

  document.querySelectorAll('.cd:not(.empty)').forEach(el=>el.addEventListener('click',()=>{sel=el.dataset.d;render()}));
  $('mb').addEventListener('click',()=>sheet());
  $('tb').addEventListener('click',toggleTheme);
  document.querySelectorAll('.meal-header').forEach(el=>el.addEventListener('click',()=>{const type=el.dataset.type;openSections[type]=!openSections[type];render()}));
  document.querySelectorAll('.mi').forEach(el=>el.addEventListener('click',(e)=>{e.stopPropagation();const type=el.dataset.type,idx=+el.dataset.idx;showModal(data[sel][type][idx],type)}));
}

$('ov').addEventListener('click',()=>sheet(false));
$('mov').addEventListener('click',hideModal);
if(window.matchMedia&&window.matchMedia('(prefers-color-scheme:light)').matches){
  document.body.classList.add('light');
  document.documentElement.style.setProperty('background','#ffffff','important');
  document.body.style.setProperty('background','#ffffff','important');
}
loadData();
</script>
</body>
</html>
